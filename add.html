    <section class="Add">
        <div class="title">
            <p>Add a new Course</p>
        </div>
        <div class="added">
            <form>
                <div class="input-group">
                    <label for="Name">Course Name</label>
                    <input type="text" name="Course-name" placeholder="  eg. Math" required />
                </div>
                <div class="input-group">
                    <label for="Instructor">Instructor</label>
                    <input type="text" name="Instructor" placeholder="   eg. Dr.Wael" required />
                </div>
                <div class="input-group">
                    <label for="hours">Credit Hours</label>
                    <select name="hours" id="hours" required>
                    <option value="" disabled selected>Select hours</option>
                    <option value="2">2h</option>
                    <option value="3">3h</option>
                    <option value="4">4h</option>
            </select>
                </div>
                <div class="input-group">
                    <label for="Notes">Add Notes</label>
                    <textarea name="Notes" placeholder="write notes about the course"></textarea>
                </div>
                <button>Add</button>
            </form>
        </div>
    </section>
